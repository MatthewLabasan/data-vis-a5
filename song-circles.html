<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>One Hit Wonder Trends</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #0d0d0d;
    color: #e8e8e8;
    font-family: 'SF Mono', 'Fira Code', monospace;
    overflow: hidden;
    height: 100vh;
    width: 100vw;
  }

  /* ─── SMALL MULTIPLES VIEW ─── */
  #small-multiples {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    padding: 32px 48px;
    transition: opacity 0.5s ease;
  }

  .view-header {
    margin-bottom: 28px;
  }

  .view-title {
    font-size: 11px;
    letter-spacing: 0.25em;
    color: #555;
    text-transform: uppercase;
    margin-bottom: 8px;
  }

  .view-heading {
    font-size: 28px;
    font-weight: 700;
    letter-spacing: -0.02em;
    color: #f0f0f0;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  }

  .sort-bar {
    display: flex;
    gap: 8px;
    margin-top: 12px;
    align-items: center;
  }

  .sort-label {
    font-size: 10px;
    color: #555;
    letter-spacing: 0.15em;
    text-transform: uppercase;
  }

  .sort-btn {
    background: #1a1a1a;
    border: 1px solid #2a2a2a;
    color: #888;
    padding: 4px 12px;
    border-radius: 4px;
    font-size: 10px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.2s;
    font-family: inherit;
  }

  .sort-btn:hover, .sort-btn.active {
    background: #222;
    border-color: #444;
    color: #e8e8e8;
  }

  #circles-grid {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    grid-template-rows: repeat(4, 1fr);
    gap: 20px;
    flex: 1;
    padding: 8px 0;
  }

  .song-circle-wrap {
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
  }

  .song-circle-wrap svg {
    overflow: visible;
  }

  .song-circle {
    transition: transform 0.2s ease;
    transform-origin: center;
  }

  .song-circle-wrap:hover .song-circle {
    transform: scale(1.06);
  }

  .circle-bg {
    fill: #161616;
    stroke: #333;
    stroke-width: 1.5;
    transition: stroke 0.2s, fill 0.2s;
  }

  .song-circle-wrap:hover .circle-bg {
    stroke: #666;
    fill: #1e1e1e;
  }

  .rank-badge {
    fill: #2a2a2a;
    font-size: 9px;
    font-family: 'SF Mono', monospace;
    fill: #555;
    letter-spacing: 0.05em;
  }

  .circle-title {
    fill: #e8e8e8;
    font-weight: 600;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    text-anchor: middle;
  }

  .circle-artist {
    fill: #666;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    text-anchor: middle;
  }

  .circle-genre {
    fill: #3a3a3a;
    font-size: 8px;
    font-family: 'SF Mono', monospace;
    text-anchor: middle;
    letter-spacing: 0.08em;
  }

  /* Clip density arc */
  .clip-arc {
    fill: none;
    stroke-width: 2;
    stroke-linecap: round;
    opacity: 0.5;
  }

  /* ─── SINGLE SONG VIEW ─── */
  #song-view {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.4s ease;
  }

  #song-view.visible {
    opacity: 1;
    pointer-events: all;
  }

  /* Top content area (scrollable middle) */
  #song-top {
    flex: 1;
    display: flex;
    flex-direction: column;
    padding: 32px 48px 16px;
    min-height: 0;
  }

  .song-view-header {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    margin-bottom: 24px;
    flex-shrink: 0;
  }

  .back-btn {
    background: none;
    border: 1px solid #2a2a2a;
    color: #555;
    padding: 6px 14px;
    border-radius: 4px;
    font-size: 10px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    cursor: pointer;
    font-family: inherit;
    transition: all 0.2s;
  }

  .back-btn:hover {
    border-color: #444;
    color: #aaa;
  }

  .song-meta h1 {
    font-size: 24px;
    font-weight: 700;
    letter-spacing: -0.02em;
    color: #f0f0f0;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    line-height: 1.1;
  }

  .song-meta .artist {
    font-size: 13px;
    color: #666;
    margin-top: 4px;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  }

  .song-meta .genre-tag {
    display: inline-block;
    margin-top: 8px;
    font-size: 9px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: #3a3a3a;
    border: 1px solid #2a2a2a;
    padding: 2px 8px;
    border-radius: 3px;
  }

  /* Main song view layout — circle left, clips right */
  #song-main {
    display: flex;
    flex: 1;
    gap: 32px;
    min-height: 0;
  }

  /* Left: circle only */
  #song-left {
    display: flex;
    flex-direction: column;
    width: 220px;
    flex-shrink: 0;
  }

  #song-circle-svg-wrap {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: flex-start;
  }

  #song-circle-svg {
    overflow: visible;
  }

  /* Right: TikTok clips panel */
  #clips-panel {
    flex: 1;
    display: flex;
    flex-direction: column;
    min-width: 0;
  }

  #clips-panel-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 12px;
    flex-shrink: 0;
  }

  #clips-panel-header span {
    font-size: 9px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: #444;
  }

  #clip-count {
    font-size: 9px;
    color: #333;
    font-family: 'SF Mono', monospace;
  }

  #clips-list {
    flex: 1;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  #clips-list::-webkit-scrollbar { width: 4px; }
  #clips-list::-webkit-scrollbar-track { background: transparent; }
  #clips-list::-webkit-scrollbar-thumb { background: #2a2a2a; border-radius: 2px; }

  /* ─── FULL-WIDTH TIMELINE BAR (bottom) ─── */
  #timeline-area {
    flex-shrink: 0;
    background: #0a0a0a;
    border-top: 1px solid #1a1a1a;
    padding: 14px 48px 20px;
  }

  .density-seg {
    position: absolute;
    top: 0;
    height: 100%;
    border-radius: 2px;
    pointer-events: none;
    mix-blend-mode: screen;
    z-index: 1;
  }

  /* Scrubber row */
  #scrubber-row {
    display: flex;
    align-items: center;
    gap: 14px;
  }

  #timeline-track {
    position: relative;
    flex: 1;
    height: 24px;
    background: #111;
    border-radius: 3px;
    cursor: pointer;
    overflow: hidden;
  }

  #timeline-fill {
    position: absolute;
    right: 0;
    top: 0;
    height: 100%;
    background: rgba(0, 0, 0, 0.52);
    pointer-events: none;
    z-index: 2;
  }

  #timeline-head {
    position: absolute;
    top: 0;
    width: 2px;
    height: 100%;
    background: rgba(255, 255, 255, 0.85);
    transform: translateX(-50%);
    pointer-events: none;
    z-index: 3;
    box-shadow: 0 0 6px rgba(255, 255, 255, 0.3);
  }

  #timeline-label {
    display: flex;
    justify-content: space-between;
    font-size: 9px;
    color: #3a3a3a;
    letter-spacing: 0.1em;
    margin-bottom: 5px;
    font-family: 'SF Mono', monospace;
  }

  #timeline-controls {
    display: flex;
    align-items: center;
    gap: 8px;
    flex-shrink: 0;
  }

  .ctrl-btn {
    background: #111;
    border: 1px solid #222;
    color: #666;
    width: 30px;
    height: 30px;
    border-radius: 4px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 11px;
    transition: all 0.15s;
    flex-shrink: 0;
  }

  .ctrl-btn:hover {
    border-color: #444;
    color: #ddd;
    background: #1a1a1a;
  }

  .ctrl-btn.play-btn {
    width: 36px;
    height: 36px;
    font-size: 13px;
    color: #e8e8e8;
    border-color: #2a2a2a;
  }

  #time-display {
    font-size: 10px;
    color: #555;
    font-family: 'SF Mono', monospace;
    letter-spacing: 0.08em;
    white-space: nowrap;
  }

  #song-top {
    flex: 1;
    display: flex;
    flex-direction: column;
    padding: 32px 48px 16px;
    min-height: 0;
    overflow: hidden;
  }

  .clip-card {
    background: #111;
    border: 1px solid #1e1e1e;
    border-radius: 5px;
    padding: 10px 14px;
    display: flex;
    align-items: center;
    gap: 12px;
    cursor: pointer;
    transition: all 0.15s;
    flex-shrink: 0;
  }

  .clip-card:hover {
    border-color: #2a2a2a;
    background: #141414;
  }

  .clip-card.active {
    border-color: #3a3a3a;
    background: #161616;
  }

  .clip-number {
    font-size: 9px;
    color: #333;
    font-family: 'SF Mono', monospace;
    width: 18px;
    flex-shrink: 0;
    text-align: right;
  }

  .clip-timestamp {
    font-size: 11px;
    color: #888;
    font-family: 'SF Mono', monospace;
    letter-spacing: 0.05em;
    width: 100px;
    flex-shrink: 0;
  }

  .clip-timestamp.active-ts { color: #e8e8e8; }

  .clip-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    flex-shrink: 0;
    opacity: 0.6;
  }

  .clip-category {
    font-size: 10px;
    color: #555;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    flex: 1;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .clip-link {
    font-size: 9px;
    color: #333;
    text-decoration: none;
    letter-spacing: 0.05em;
    transition: color 0.15s;
    flex-shrink: 0;
  }

  .clip-link:hover { color: #888; }

  /* Active now indicator */
  .now-playing-bar {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    background: #161616;
    border: 1px solid #2a2a2a;
    border-radius: 3px;
    padding: 3px 8px;
    font-size: 9px;
    color: #555;
    letter-spacing: 0.1em;
    margin-bottom: 8px;
  }

  .now-playing-bar .dot {
    width: 4px;
    height: 4px;
    border-radius: 50%;
    background: #e8e8e8;
    animation: pulse 1.5s infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }

  /* Zoom transition overlay */
  #zoom-overlay {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 100;
  }

  #zoom-circle {
    position: fixed;
    border-radius: 50%;
    background: #161616;
    border: 1.5px solid #333;
    pointer-events: none;
    transform: translate(-50%, -50%);
    transition: none;
    z-index: 100;
  }
</style>
</head>

  <!-- Full-width timeline pinned to bottom -->
  <div id="timeline-area">

      </div>
      <div id="timeline-track">
        <div id="timeline-fill"></div>
        <div id="timeline-head"></div>
      </div>
      <span id="time-display">0:00 / —</span>
    </div>
  </div>

</div>

<!-- Zoom overlay -->
<div id="zoom-overlay">
  <div id="zoom-circle" style="display:none"></div>
</div>

// ─── HELPERS ─────────────────────────────────────────────────────────────────
function parseTime(s) {
  if (!s) return 0;
  const parts = s.trim().split(':');
  if (parts.length === 2) return parseInt(parts[0]) * 60 + parseFloat(parts[1]);
  return 0;
}

function parseLength(l) {
  if (!l) return 180;
  return parseTime(l);
}

function fmtTime(s) {
  const m = Math.floor(s / 60);
  const sec = Math.floor(s % 60);
  return `${m}:${String(sec).padStart(2, '0')}`;
}

// Parse clip start times per song
function getClipStartTimes(song) {
  const starts = new Set();
  song.clips.forEach(c => {
    const [start] = c.timestamp.split(' - ');
    starts.add(parseTime(start));
  });
  return [...starts].sort((a, b) => a - b);
}

};

function catColor(cat) {
  return CAT_COLORS[cat] || CAT_COLORS.default;
}

// ─── SMALL MULTIPLES ────────────────────────────────────────────────────────
let currentSort = 'rank';
let displayOrder = [...SONGS];

function sortSongs(by) {
  currentSort = by;
  if (by === 'rank') displayOrder = [...SONGS].sort((a, b) => a.rank - b.rank);
  else if (by === 'clips') displayOrder = [...SONGS].sort((a, b) => b.clips.length - a.clips.length);
  else if (by === 'genre') displayOrder = [...SONGS].sort((a, b) => a.genre.localeCompare(b.genre));
  renderGrid();
}

function renderGrid() {
  const grid = document.getElementById('circles-grid');
  grid.innerHTML = '';

  displayOrder.forEach((song, i) => {
    const wrap = document.createElement('div');
    wrap.className = 'song-circle-wrap';
    wrap.dataset.rank = song.rank;

    const size = 110;
    const r = 46;
    const cx = size / 2, cy = size / 2;

    const svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
    svg.setAttribute('width', size);
    svg.setAttribute('height', size);
    svg.setAttribute('viewBox', `0 0 ${size} ${size}`);

    const g = document.createElementNS('http://www.w3.org/2000/svg', 'g');
    g.className.baseVal = 'song-circle';

    // Main circle
    const circle = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
    circle.setAttribute('cx', cx); circle.setAttribute('cy', cy); circle.setAttribute('r', r);
    circle.className.baseVal = 'circle-bg';
    g.appendChild(circle);

    // Title text (multi-line wrapping)
    const words = song.name.split(' ');
    const maxChars = 10;
    let lines = [];
    let currentLine = '';
    words.forEach(w => {
      if ((currentLine + ' ' + w).trim().length <= maxChars) {
        currentLine = (currentLine + ' ' + w).trim();
      } else {
        if (currentLine) lines.push(currentLine);
        currentLine = w;
      }
    });
    if (currentLine) lines.push(currentLine);

    const lineH = 11;
    const titleY = cy - (lines.length - 1) * lineH / 2 - 6;

    lines.forEach((line, li) => {
      const t = document.createElementNS('http://www.w3.org/2000/svg', 'text');
      t.setAttribute('x', cx);
      t.setAttribute('y', titleY + li * lineH);
      t.setAttribute('font-size', '10');
      t.className.baseVal = 'circle-title';
      t.textContent = line;
      g.appendChild(t);
    });

    // Artist
    const artistEl = document.createElementNS('http://www.w3.org/2000/svg', 'text');
    artistEl.setAttribute('x', cx);
    artistEl.setAttribute('y', titleY + lines.length * lineH + 2);
    artistEl.setAttribute('font-size', '7.5');
    artistEl.className.baseVal = 'circle-artist';
    const shortArtist = song.artist.length > 14 ? song.artist.substring(0, 13) + '…' : song.artist;
    artistEl.textContent = shortArtist;
    g.appendChild(artistEl);

    // Rank
    const rankEl = document.createElementNS('http://www.w3.org/2000/svg', 'text');
    rankEl.setAttribute('x', cx);
    rankEl.setAttribute('y', cy + r - 8);
    rankEl.setAttribute('font-size', '8');
    rankEl.setAttribute('fill', '#444');
    rankEl.setAttribute('text-anchor', 'middle');
    rankEl.setAttribute('font-family', 'SF Mono, monospace');
    rankEl.textContent = `#${song.rank}`;
    g.appendChild(rankEl);

    svg.appendChild(g);
    wrap.appendChild(svg);
    grid.appendChild(wrap);

    wrap.addEventListener('click', () => zoomIntoSong(song, wrap));
  });
}

// ─── ZOOM TRANSITION ────────────────────────────────────────────────────────
function zoomIntoSong(song, wrapEl) {
  const rect = wrapEl.getBoundingClientRect();
  const cx = rect.left + rect.width / 2;
  const cy = rect.top + rect.height / 2;
  const startR = rect.width / 2;

  const zc = document.getElementById('zoom-circle');
  zc.style.display = 'block';
  zc.style.left = cx + 'px';
  zc.style.top = cy + 'px';
  zc.style.width = (startR * 2) + 'px';
  zc.style.height = (startR * 2) + 'px';
  zc.style.transition = 'none';

  // Force reflow
  zc.getBoundingClientRect();

  const maxDim = Math.max(window.innerWidth, window.innerHeight) * 2.5;
  zc.style.transition = 'width 0.55s cubic-bezier(0.4,0,0.2,1), height 0.55s cubic-bezier(0.4,0,0.2,1)';
  zc.style.width = maxDim + 'px';
  zc.style.height = maxDim + 'px';

  setTimeout(() => {
    document.getElementById('small-multiples').style.opacity = '0';
    document.getElementById('small-multiples').style.pointerEvents = 'none';
    openSongView(song);

    setTimeout(() => {
      zc.style.transition = 'none';
      zc.style.display = 'none';
      document.getElementById('song-view').classList.add('visible');
    }, 120);
  }, 400);
}

function zoomOut() {
  stopPlayback();
  document.getElementById('song-view').classList.remove('visible');

  setTimeout(() => {
    document.getElementById('small-multiples').style.opacity = '1';
    document.getElementById('small-multiples').style.pointerEvents = 'all';
  }, 300);
}

document.getElementById('back-btn').addEventListener('click', zoomOut);

// ─── SONG VIEW ───────────────────────────────────────────────────────────────
let currentSong = null;
let playTimer = null;
let currentTimeSec = 0;
let isPlaying = false;
let songDuration = 0;
let clipStartTimes = [];
let activeClipIdx = -1;
let processedClips = [];

function parseClips(song) {
  return song.clips.map((c, i) => {
    const parts = c.timestamp.split(' - ');
    return {
      ...c,
      startSec: parseTime(parts[0]),
      endSec: parts[1] ? parseTime(parts[1]) : parseTime(parts[0]) + 15,
      index: i
    };
  }).sort((a, b) => a.startSec - b.startSec);
}

function openSongView(song) {
  currentSong = song;
  currentTimeSec = 0;
  isPlaying = false;
  activeClipIdx = -1;
  songDuration = parseLength(song.length);
  clipStartTimes = getClipStartTimes(song);
  processedClips = parseClips(song);

  document.getElementById('sv-title').textContent = song.name;
  document.getElementById('sv-artist').textContent = song.artist;
  document.getElementById('sv-genre').textContent = song.genre;
  document.getElementById('play-btn').textContent = '▶';
  document.getElementById('tl-total').textContent = fmtTime(songDuration);
  document.getElementById('clip-count').textContent = `${song.clips.length} clips`;

  const songFile = SONG_FILES[song.rank];
  if (songFile) {
    audioEl.src = songFile;
    audioEl.load();
    audioEl.currentTime = 0;
  } else {
    audioEl.removeAttribute('src');
  }

  renderSongCircle(song);
  renderClipsList(song);
  renderTimelineTicks(song);
  updateTimeline();
}

function renderSongCircle(song) {
  const svg = document.getElementById('song-circle-svg');
  svg.innerHTML = '';
  const size = 180;
  const r = 78;
  const cx = size / 2, cy = size / 2;
  svg.setAttribute('viewBox', `0 0 ${size} ${size}`);

  // Circle outline only — interior content added later
  const circle = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
  circle.setAttribute('cx', cx); circle.setAttribute('cy', cy); circle.setAttribute('r', r);
  circle.setAttribute('fill', 'none');
  circle.setAttribute('stroke', '#2a2a2a');
  circle.setAttribute('stroke-width', '1.5');
  svg.appendChild(circle);
}

function updateSongCircle() {
  // interior content TBD
}

function renderClipsList(song) {
  const list = document.getElementById('clips-list');
  list.innerHTML = '';
  processedClips.forEach((c, i) => {
    const card = document.createElement('div');
    card.className = 'clip-card';
    card.id = `clip-card-${i}`;
    card.innerHTML = `
      <span class="clip-number">${c.index + 1}</span>
      <span class="clip-timestamp" id="clip-ts-${i}">${c.timestamp}</span>
      <span class="clip-dot" style="background:${catColor(c.category)}"></span>
      <span class="clip-category">${c.category}</span>
      <a class="clip-link" href="${c.link}" target="_blank" rel="noopener">↗ TikTok</a>
    `;
    card.addEventListener('click', () => {
      currentTimeSec = c.startSec;
      if (audioEl.src) audioEl.currentTime = currentTimeSec;
      updateTimeline();
      updateSongCircle();
      checkClipActivation();
    });
    list.appendChild(card);
  });
}

function renderTimelineTicks(song) {
  const track = document.getElementById('timeline-track');
  track.querySelectorAll('.density-seg').forEach(el => el.remove());

  const totalLen = parseLength(song.length);

  processedClips.forEach(c => {
    const leftPct  = (c.startSec / totalLen) * 100;
    const widthPct = Math.max(0.4, ((c.endSec - c.startSec) / totalLen) * 100);
    const seg = document.createElement('div');
    seg.className = 'density-seg';
    seg.style.left    = leftPct + '%';
    seg.style.width   = widthPct + '%';
    seg.style.background = catColor(c.category);
    seg.style.opacity = '0.55';
    seg.title = `${c.category}: ${c.timestamp}`;
    track.appendChild(seg);
  });
}

function updateTimeline() {
  const pct = songDuration > 0 ? (currentTimeSec / songDuration) * 100 : 0;
  document.getElementById('timeline-fill').style.width = (100 - pct) + '%';
  document.getElementById('timeline-head').style.left = pct + '%';
  document.getElementById('tl-current').textContent = fmtTime(currentTimeSec);
  document.getElementById('time-display').textContent = `${fmtTime(currentTimeSec)} / ${fmtTime(songDuration)}`;
}

function checkClipActivation() {
  let newIdx = -1;
  processedClips.forEach((c, i) => {
    if (currentTimeSec >= c.startSec && currentTimeSec <= c.endSec) {
      newIdx = i;
    }
  });

  if (newIdx !== activeClipIdx) {
    // Deactivate old
    if (activeClipIdx >= 0) {
      const old = document.getElementById(`clip-card-${activeClipIdx}`);
      if (old) old.classList.remove('active');
      const ots = document.getElementById(`clip-ts-${activeClipIdx}`);
      if (ots) ots.classList.remove('active-ts');
    }
    activeClipIdx = newIdx;
    if (newIdx >= 0) {
      const card = document.getElementById(`clip-card-${newIdx}`);
      if (card) {
        card.classList.add('active');
        card.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        const ts = document.getElementById(`clip-ts-${newIdx}`);
        if (ts) ts.classList.add('active-ts');
      }
      const np = document.getElementById('now-playing-bar');
      np.style.display = 'inline-flex';
      document.getElementById('now-playing-text').textContent = `Clip ${newIdx + 1} — ${processedClips[newIdx].category}`;
    } else {
      document.getElementById('now-playing-bar').style.display = 'none';
    }
  }
}

// Playback
function tick() {
  if (!isPlaying) return;
  currentTimeSec = audioEl.currentTime;
  updateTimeline();
  updateSongCircle();
  checkClipActivation();

  if (audioEl.ended || currentTimeSec >= songDuration) {
    stopPlayback();
    return;
  }
  playTimer = requestAnimationFrame(tick);
}

function startPlayback() {
  if (currentTimeSec >= songDuration) currentTimeSec = 0;
  if (audioEl.src) {
    audioEl.currentTime = currentTimeSec;
    audioEl.play().catch(() => {});
  }
  isPlaying = true;
  playTimer = requestAnimationFrame(tick);
  document.getElementById('play-btn').textContent = '⏸';
}

function stopPlayback() {
  isPlaying = false;
  if (playTimer) cancelAnimationFrame(playTimer);
  playTimer = null;
  if (audioEl.src) audioEl.pause();
  document.getElementById('play-btn').textContent = '▶';
}

document.getElementById('play-btn').addEventListener('click', () => {
  if (isPlaying) stopPlayback(); else startPlayback();
});

document.getElementById('skip-btn').addEventListener('click', () => {
  const next = clipStartTimes.find(t => t > currentTimeSec + 0.1);
  if (next !== undefined) {
    currentTimeSec = next;
    if (audioEl.src) audioEl.currentTime = currentTimeSec;
    updateTimeline();
    updateSongCircle();
    checkClipActivation();
  }
});

document.getElementById('restart-btn').addEventListener('click', () => {
  stopPlayback();
  currentTimeSec = 0;
  if (audioEl.src) audioEl.currentTime = 0;
  updateTimeline();
  updateSongCircle();
  checkClipActivation();
});

// Click on timeline to seek
document.getElementById('timeline-track').addEventListener('click', function(e) {
  const rect = this.getBoundingClientRect();
  const pct = (e.clientX - rect.left) / rect.width;
  currentTimeSec = Math.max(0, Math.min(pct * songDuration, songDuration));
  if (audioEl.src) audioEl.currentTime = currentTimeSec;
  updateTimeline();
  updateSongCircle();
  checkClipActivation();
});

// ─── INIT ────────────────────────────────────────────────────────────────────
renderGrid();
