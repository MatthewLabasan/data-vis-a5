<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pick a Trend Path</title>
<style>
  :root {
    --bg: #0d0d0d;
    --panel: #171717;
    --line: #2a2a2a;
    --ink: #f0f0f0;
    --muted: #8b8b8b;
    --oneHit: #f037a5;
    --long: #93e9de;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    min-height: 100vh;
    display: grid;
    place-items: center;
    background: radial-gradient(circle at 20% 15%, #1a1a1a 0%, var(--bg) 55%);
    color: var(--ink);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    padding: 24px;
  }
  .panel {
    width: min(880px, 100%);
    background: rgba(23, 23, 23, 0.9);
    border: 1px solid var(--line);
    border-radius: 10px;
    padding: 34px 34px 30px;
  }
  .kicker {
    font-size: 11px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 10px;
  }
  h1 {
    margin: 0;
    font-size: clamp(26px, 4vw, 38px);
    line-height: 1.1;
  }
  .sub {
    margin: 10px 0 24px;
    color: var(--muted);
    max-width: 650px;
  }
  .choices {
    display: grid;
    grid-template-columns: repeat(2, minmax(220px, 1fr));
    gap: 14px;
  }
  .choice {
    display: block;
    text-decoration: none;
    border: 1px solid var(--line);
    border-radius: 8px;
    padding: 18px 16px;
    color: var(--ink);
    background: #131313;
    transition: transform 0.15s ease, border-color 0.15s ease, background 0.15s ease;
  }
  .choice:hover {
    transform: translateY(-1px);
    border-color: #4a4a4a;
    background: #1a1a1a;
  }
  .choice h2 {
    margin: 0 0 8px;
    font-size: 20px;
  }
  .choice p {
    margin: 0;
    color: var(--muted);
    font-size: 14px;
    line-height: 1.45;
  }
  .choice.one h2 { color: var(--oneHit); }
  .choice.long h2 { color: var(--long); }
  .back-home {
    display: inline-block;
    margin-top: 16px;
    text-decoration: none;
    color: var(--muted);
    border: 1px solid var(--line);
    border-radius: 6px;
    padding: 8px 10px;
    font-size: 11px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    transition: all 0.15s ease;
  }
  .back-home:hover {
    color: var(--ink);
    border-color: #4a4a4a;
    background: #1a1a1a;
  }
</style>
</head>
<body>
  <main class="panel">
    <div class="kicker">Next Step</div>
    <h1>Choose what you want to examine first</h1>
    <p class="sub">Start with one path, then switch later in the small multiples view whenever you want.</p>
    <section class="choices">
      <a class="choice one" href="song-circles.html?view=one-hit">
        <h2>One Hit Wonders</h2>
        <p>Songs that spike quickly within a tight time window.</p>
      </a>
      <a class="choice long" href="song-circles.html?view=long-lasting">
        <h2>Long Lasting Trends</h2>
        <p>Songs that stay active across a broader timeline.</p>
      </a>
    </section>
    <a class="back-home" href="opening_view.html">← Back to Homepage</a>
  </main>
</body>
</html>
